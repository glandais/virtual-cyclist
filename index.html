<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Virtual Cyclist - Interactive GPX Demo</title>
        <link rel="stylesheet" href="demo.css" />
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom"></script>
    </head>
    <body>
        <div id="app">
            <!-- Header Section -->
            <header class="app-header">
                <h1>🚴‍♂️ Virtual Cyclist - Interactive GPX Analysis</h1>
                <p>Analyze cycling data with elevation correction and maximum speed computation</p>
            </header>

            <!-- File Selection Section -->
            <section class="file-section">
                <div class="file-controls">
                    <div class="file-group">
                        <label for="gpx-select">Choose sample GPX:</label>
                        <select id="gpx-select">
                            <option value="">Select a sample file...</option>
                            <option value="gpx/sample.gpx">Sample Route</option>
                            <option value="gpx/stelvio.gpx">Stelvio descent</option>
                            <option value="gpx/amazfit.gpx">Amazfit Track</option>
                            <option value="gpx/garmin.gpx">Garmin Track</option>
                            <option value="gpx/movescount.gpx">Movescount Track</option>
                            <option value="gpx/sports-tracker.gpx">Sports Tracker</option>
                            <option value="gpx/strava.gpx">Strava Track</option>
                        </select>
                    </div>
                    <div class="file-group">
                        <label for="gpx-upload">Or upload your own:</label>
                        <input type="file" id="gpx-upload" accept=".gpx" />
                    </div>
                </div>
                <div id="file-info" class="file-info"></div>
            </section>

            <!-- Control Panel -->
            <section class="control-panel">
                <div class="action-buttons">
                    <button id="fix-elevation-btn" class="btn btn-primary" disabled>
                        🏔️ Fix Elevation
                    </button>
                    <button id="compute-speeds-btn" class="btn btn-primary" disabled>
                        ⚡ Compute Max Speeds
                    </button>
                    <button id="enhance-path-btn" class="btn btn-primary" disabled>
                        🚀 Enhance Path
                    </button>
                    <button id="reset-zoom-btn" class="btn btn-secondary" disabled>
                        🔍 Reset Zoom
                    </button>
                </div>
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                    <div id="status-text" class="status-text"></div>
                </div>
            </section>

            <!-- Data Selection Panel -->
            <section class="data-panel">
                <h3>📊 Data Fields to Display</h3>
                <div class="field-categories">
                    <div class="field-category">
                        <h4>🏔️ Elevation & Terrain</h4>
                        <div class="field-checkboxes" id="elevation-fields"></div>
                    </div>
                    <div class="field-category">
                        <h4>📐 Grade & Slope</h4>
                        <div class="field-checkboxes" id="grade-fields"></div>
                    </div>
                    <div class="field-category">
                        <h4>🏃‍♂️ Speed & Motion</h4>
                        <div class="field-checkboxes" id="speed-fields"></div>
                    </div>
                    <div class="field-category">
                        <h4>⚡ Power & Physics</h4>
                        <div class="field-checkboxes" id="power-fields"></div>
                    </div>
                    <div class="field-category">
                        <h4>🌡️ Environmental</h4>
                        <div class="field-checkboxes" id="environmental-fields"></div>
                    </div>
                    <div class="field-category">
                        <h4>❤️ Physiological</h4>
                        <div class="field-checkboxes" id="physiological-fields"></div>
                    </div>
                </div>
            </section>

            <!-- Chart Section -->
            <section class="chart-section">
                <div class="chart-container">
                    <canvas id="data-chart"></canvas>
                </div>
                <div class="chart-info">
                    <div id="chart-legend" class="chart-legend"></div>
                    <div id="chart-stats" class="chart-stats"></div>
                </div>
            </section>
        </div>

        <!-- Loading Scripts -->
        <script src="https://cdn.jsdelivr.net/npm/@glandais/elevation@3/dist/index.min.js"></script>
        <script src="dist/index.min.js"></script>
        <script src="demo.js"></script>
    </body>
</html>
